name: Deploy Release

on:
  workflow_dispatch:
    inputs:
      component:
        description: Component to deploy
        required: true
        type: choice
        options:
          - frontend
          - api
          - mmr-api
      version:
        description: Released version to deploy
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: deploy-${{ inputs.component }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Verify release exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ format('{0}@{1}', inputs.component, inputs.version) }}
        run: gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null

      - uses: actions/checkout@v4
        with:
          ref: ${{ format('{0}@{1}', inputs.component, inputs.version) }}

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Frontend deploy diagnostics (preflight)
        if: inputs.component == 'frontend'
        env:
          CLERK_PUBLISHABLE_KEY: ${{ secrets['CLERK_PUBLISHABLE_KEY'] }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          FRONTEND_API_BASE_PATH: ${{ secrets.API_BASE_PATH }}
          UI_CONTAINER_APP_NAME: ${{ secrets.UI_CONTAINER_APP_NAME }}
          RESOURCE_GROUP: ${{ secrets.RESOURCE_GROUP }}
        run: |
          echo "Frontend deploy preflight diagnostics"
          echo "Container app: ${UI_CONTAINER_APP_NAME}"
          echo "Resource group: ${RESOURCE_GROUP}"

          if [ -n "${CLERK_PUBLISHABLE_KEY}" ]; then
            echo "CLERK_PUBLISHABLE_KEY configured: yes"
            echo "CLERK_PUBLISHABLE_KEY length: ${#CLERK_PUBLISHABLE_KEY}"
          else
            echo "::warning::CLERK_PUBLISHABLE_KEY is empty. Frontend auth will fail with 500."
          fi

          if [ -n "${CLERK_SECRET_KEY}" ]; then
            echo "CLERK_SECRET_KEY configured: yes"
            echo "CLERK_SECRET_KEY length: ${#CLERK_SECRET_KEY}"
          else
            echo "::warning::CLERK_SECRET_KEY is empty. Frontend auth will fail with 500."
          fi

          if [ -n "${FRONTEND_API_BASE_PATH}" ]; then
            echo "API_BASE_PATH configured: yes"
            echo "API_BASE_PATH value: ${FRONTEND_API_BASE_PATH}"
          else
            echo "::error::API_BASE_PATH is empty. Frontend server API calls will fail."
            exit 1
          fi

      - name: Prepare and validate Clerk keys
        if: inputs.component == 'frontend'
        id: clerk_keys
        env:
          RAW_PUBLISHABLE_KEY: ${{ secrets['CLERK_PUBLISHABLE_KEY'] }}
          RAW_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
        run: |
          sanitize() {
            value="$1"
            # Remove CR/LF and trim one pair of surrounding double quotes.
            value="$(printf '%s' "$value" | tr -d '\r\n')"
            value="${value#\"}"
            value="${value%\"}"
            printf '%s' "$value"
          }

          PUBLISHABLE_KEY="$(sanitize "${RAW_PUBLISHABLE_KEY}")"
          SECRET_KEY="$(sanitize "${RAW_SECRET_KEY}")"

          echo "::add-mask::${PUBLISHABLE_KEY}"
          echo "::add-mask::${SECRET_KEY}"

          if [ -z "${PUBLISHABLE_KEY}" ]; then
            echo "::error::CLERK_PUBLISHABLE_KEY is empty after sanitization."
            exit 1
          fi

          if [ -z "${SECRET_KEY}" ]; then
            echo "::error::CLERK_SECRET_KEY is empty after sanitization."
            exit 1
          fi

          if ! printf '%s' "${PUBLISHABLE_KEY}" | grep -Eq '^pk_(test|live)_.+'; then
            echo "::error::CLERK_PUBLISHABLE_KEY format is invalid. Expected prefix pk_test_ or pk_live_."
            exit 1
          fi

          if ! printf '%s' "${SECRET_KEY}" | grep -Eq '^sk_(test|live)_.+'; then
            echo "::error::CLERK_SECRET_KEY format is invalid. Expected prefix sk_test_ or sk_live_."
            exit 1
          fi

          echo "publishable_key=${PUBLISHABLE_KEY}" >> "$GITHUB_OUTPUT"
          echo "secret_key=${SECRET_KEY}" >> "$GITHUB_OUTPUT"

          echo "Prepared Clerk keys successfully"
          echo "publishable key prefix: ${PUBLISHABLE_KEY%%_*}_$(printf '%s' "${PUBLISHABLE_KEY#*_}" | cut -d '_' -f1)"
          echo "secret key prefix: ${SECRET_KEY%%_*}_$(printf '%s' "${SECRET_KEY#*_}" | cut -d '_' -f1)"

      - name: Deploy frontend release
        if: inputs.component == 'frontend'
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}/frontend
          dockerfilePath: Dockerfile
          acrName: ${{ secrets.ACR_NAME }}
          buildArguments: |
            PUBLIC_CLERK_PUBLISHABLE_KEY=${{ steps.clerk_keys.outputs.publishable_key }}
          environmentVariables: PUBLIC_CLERK_PUBLISHABLE_KEY=${{ steps.clerk_keys.outputs.publishable_key }} CLERK_SECRET_KEY=${{ steps.clerk_keys.outputs.secret_key }} API_BASE_PATH=${{ secrets.API_BASE_PATH }}
          containerAppName: ${{ secrets.UI_CONTAINER_APP_NAME }}
          resourceGroup: ${{ secrets.RESOURCE_GROUP }}
          targetPort: 3000

      - name: Frontend deploy diagnostics (post-deploy)
        if: inputs.component == 'frontend'
        env:
          UI_CONTAINER_APP_NAME: ${{ secrets.UI_CONTAINER_APP_NAME }}
          RESOURCE_GROUP: ${{ secrets.RESOURCE_GROUP }}
        run: |
          echo "Frontend deploy post-deploy diagnostics"
          echo "Latest revision:"
          az containerapp show \
            --name "${UI_CONTAINER_APP_NAME}" \
            --resource-group "${RESOURCE_GROUP}" \
            --query "properties.latestRevisionName" \
            -o tsv

          echo "Configured container environment variable names:"
          az containerapp show \
            --name "${UI_CONTAINER_APP_NAME}" \
            --resource-group "${RESOURCE_GROUP}" \
            --query "properties.template.containers[0].env[].name" \
            -o tsv

          echo "Configured container environment variable entries:"
          az containerapp show \
            --name "${UI_CONTAINER_APP_NAME}" \
            --resource-group "${RESOURCE_GROUP}" \
            --query "properties.template.containers[0].env" \
            -o json

          echo "Effective API_BASE_PATH entry:"
          az containerapp show \
            --name "${UI_CONTAINER_APP_NAME}" \
            --resource-group "${RESOURCE_GROUP}" \
            --query "properties.template.containers[0].env[?name=='API_BASE_PATH'] | [0]" \
            -o json

      - name: API deploy diagnostics (preflight)
        if: inputs.component == 'api'
        env:
          API_DB_CONNECTION_STRING: ${{ secrets.API_DB_CONNECTION_STRING }}
          AUTHORIZATION_ISSUER: ${{ secrets.CLERK_ISSUER_URL }}
          MMR_API_BASE_URL: ${{ secrets.MMR_API_BASE_URL }}
          MMR_API_KEY: ${{ secrets.MMR_API_KEY }}
          API_CONTAINER_APP_NAME: ${{ secrets.API_CONTAINER_APP_NAME }}
          RESOURCE_GROUP: ${{ secrets.RESOURCE_GROUP }}
        run: |
          echo "API deploy preflight diagnostics"
          echo "Container app: ${API_CONTAINER_APP_NAME}"
          echo "Resource group: ${RESOURCE_GROUP}"

          if [ -n "${API_DB_CONNECTION_STRING}" ]; then
            echo "API_DB_CONNECTION_STRING configured: yes"
            echo "API_DB_CONNECTION_STRING length: ${#API_DB_CONNECTION_STRING}"
          else
            echo "::error::API_DB_CONNECTION_STRING is empty."
            exit 1
          fi

          if [ -n "${AUTHORIZATION_ISSUER}" ]; then
            echo "AUTHORIZATION_ISSUER configured: yes"
            echo "AUTHORIZATION_ISSUER length: ${#AUTHORIZATION_ISSUER}"
          else
            echo "::error::AUTHORIZATION_ISSUER is empty."
            exit 1
          fi

          if [ -n "${MMR_API_BASE_URL}" ]; then
            echo "MMR_API_BASE_URL configured: yes"
            echo "MMR_API_BASE_URL length: ${#MMR_API_BASE_URL}"
          else
            echo "::error::MMR_API_BASE_URL is empty."
            exit 1
          fi

          if [ -n "${MMR_API_KEY}" ]; then
            echo "MMR_API_KEY configured: yes"
            echo "MMR_API_KEY length: ${#MMR_API_KEY}"
          else
            echo "::error::MMR_API_KEY is empty."
            exit 1
          fi

      - name: Ensure API container app secrets
        if: inputs.component == 'api'
        env:
          API_DB_CONNECTION_STRING: ${{ secrets.API_DB_CONNECTION_STRING }}
          MMR_API_KEY: ${{ secrets.MMR_API_KEY }}
          API_CONTAINER_APP_NAME: ${{ secrets.API_CONTAINER_APP_NAME }}
          RESOURCE_GROUP: ${{ secrets.RESOURCE_GROUP }}
        run: |
          echo "Creating/updating container app secrets"
          az containerapp secret set \
            --name "${API_CONTAINER_APP_NAME}" \
            --resource-group "${RESOURCE_GROUP}" \
            --secrets api-db-connection-string="${API_DB_CONNECTION_STRING}" mmr-api-key="${MMR_API_KEY}"

      - name: Deploy api release
        if: inputs.component == 'api'
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}/api/MMRProject.Api
          acrName: ${{ secrets.ACR_NAME }}
          environmentVariables: >-
            ConnectionStrings__ApiDbContext=secretref:api-db-connection-string
            Authorization__Issuer=${{ secrets.CLERK_ISSUER_URL }}
            MMRCalculationAPI__BaseUrl=${{ secrets.MMR_API_BASE_URL }}
            MMRCalculationAPI__ApiKey=secretref:mmr-api-key
            Migration__Enabled=true
          containerAppName: ${{ secrets.API_CONTAINER_APP_NAME }}
          resourceGroup: ${{ secrets.RESOURCE_GROUP }}

      - name: API deploy diagnostics (post-deploy)
        if: inputs.component == 'api'
        env:
          API_CONTAINER_APP_NAME: ${{ secrets.API_CONTAINER_APP_NAME }}
          RESOURCE_GROUP: ${{ secrets.RESOURCE_GROUP }}
        run: |
          echo "API deploy post-deploy diagnostics"
          echo "Latest revision:"
          az containerapp show \
            --name "${API_CONTAINER_APP_NAME}" \
            --resource-group "${RESOURCE_GROUP}" \
            --query "properties.latestRevisionName" \
            -o tsv

          echo "Configured container environment variable names:"
          az containerapp show \
            --name "${API_CONTAINER_APP_NAME}" \
            --resource-group "${RESOURCE_GROUP}" \
            --query "properties.template.containers[0].env[].name" \
            -o tsv

      - name: Deploy mmr-api release
        if: inputs.component == 'mmr-api'
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}/mmr-api
          acrName: ${{ secrets.ACR_NAME }}
          containerAppName: ${{ secrets.MMR_API_CONTAINER_APP_NAME }}
          resourceGroup: ${{ secrets.RESOURCE_GROUP }}
          targetPort: 8080
